<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 翻译助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- 头部 -->
    <div class="header">
      <div class="logo">✨ AI 翻译助手</div>
      <p class="subtitle">智能翻译 · 网页总结 · 划词翻译</p>
      <div class="header-tabs">
        <button class="tab-btn active" data-tab="actions">快捷操作</button>
        <button class="tab-btn" data-tab="settings">⚙</button>
        <button class="header-link" id="btnDashboard" title="打开管理面板">📊</button>
      </div>
    </div>

    <!-- 快捷操作区 -->
    <div class="tab-content active" id="tab-actions">
      <div class="action-cards">
        <button class="action-card" id="btnTranslate" title="翻译整个页面内容">
          <span class="action-icon">🌐</span>
          <span class="action-label">翻译页面</span>
          <span class="action-desc">全文翻译当前网页</span>
        </button>
        <button class="action-card" id="btnSummarize" title="AI 总结页面要点">
          <span class="action-icon">📋</span>
          <span class="action-label">网页总结</span>
          <span class="action-desc">提取核心内容摘要</span>
        </button>
      </div>
      <div class="action-cards" style="margin-top:0">
        <button class="action-card secondary" id="btnRestore" title="恢复翻译前的原文">
          <span class="action-icon">↩</span>
          <span class="action-label">恢复原文</span>
          <span class="action-desc">撤销页面翻译</span>
        </button>
        <div class="action-card disabled" style="pointer-events:none">
          <span class="action-icon">🔤</span>
          <span class="action-label">划词翻译</span>
          <span class="action-desc">选中文字自动翻译</span>
        </div>
      </div>
      <div id="actionStatus" class="status hidden"></div>
    </div>

    <!-- 设置区 -->
    <div class="tab-content" id="tab-settings">
      <div class="section">
        <div class="section-title">API 配置</div>
        <div class="form-group">
          <label for="apiKey">API Key</label>
          <div class="input-wrapper">
            <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" spellcheck="false">
            <button class="toggle-vis" id="toggleApiKey" title="显示/隐藏">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="baseUrl">接口地址 (Base URL)</label>
          <input type="text" id="baseUrl" placeholder="例如 https://api.deepseek.com" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label for="model">模型名称</label>
          <input type="text" id="model" placeholder="例如 deepseek-v4-flash" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <div class="section">
        <div class="section-title">翻译偏好</div>
        <div class="form-row" style="display:flex;gap:10px;align-items:flex-end">
          <div class="form-group flex-1">
            <label for="sourceLang">源语言</label>
            <select id="sourceLang">
              <option value="auto">自动检测</option>
              <option value="zh">中文</option><option value="en">英语</option>
              <option value="ja">日语</option><option value="ko">韩语</option>
              <option value="fr">法语</option><option value="de">德语</option><option value="es">西班牙语</option>
            </select>
          </div>
          <div class="swap-icon" id="swapLang" title="交换语言">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
          </div>
          <div class="form-group flex-1">
            <label for="targetLang">目标语言</label>
            <select id="targetLang">
              <option value="zh">中文</option><option value="en">英语</option>
              <option value="ja">日语</option><option value="ko">韩语</option>
              <option value="fr">法语</option><option value="de">德语</option><option value="es">西班牙语</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="summaryLang">总结语言</label>
          <select id="summaryLang">
            <option value="zh">中文</option><option value="en">英语</option>
          </select>
        </div>
      </div>

      <div class="setting-actions">
        <button id="saveBtn" class="btn btn-primary">保存设置</button>
        <button id="testBtn" class="btn btn-secondary">测试连接</button>
      </div>
      <div id="status" class="status hidden"></div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
