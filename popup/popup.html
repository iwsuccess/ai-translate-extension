<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Translator Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">AI Translator</div>
      <p class="subtitle">AI-powered translation & summarization</p>
    </div>

    <div class="section">
      <div class="section-title">API Configuration</div>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="input-wrapper">
          <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" spellcheck="false">
          <button class="toggle-vis" id="toggleApiKey" title="Show/Hide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.openai.com" autocomplete="off" spellcheck="false">
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" placeholder="gpt-4o-mini" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Translation Preferences</div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label for="sourceLang">From</label>
          <select id="sourceLang">
            <option value="auto">Auto Detect</option>
            <option value="zh">Chinese</option>
            <option value="en">English</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
          </select>
        </div>
        <div class="swap-icon" id="swapLang" title="Swap languages">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
          </svg>
        </div>
        <div class="form-group flex-1">
          <label for="targetLang">To</label>
          <select id="targetLang">
            <option value="zh">Chinese</option>
            <option value="en">English</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="summaryLang">Summary Language</label>
        <select id="summaryLang">
          <option value="zh">Chinese</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button id="saveBtn" class="btn btn-primary">Save Settings</button>
      <button id="testBtn" class="btn btn-secondary">Test Connection</button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
