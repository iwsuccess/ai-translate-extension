<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - AI 翻译助手</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="header-left">
        <span class="logo">✨ AI 翻译助手</span>
        <span class="badge">管理面板</span>
      </div>
      <div class="header-right">
        <span class="version">v1.0.0</span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="settings">⚙ 设置</button>
      <button class="tab-btn" data-tab="history">📜 翻译历史</button>
      <button class="tab-btn" data-tab="stats">📊 消耗统计</button>
    </nav>

    <!-- ========== 设置 Tab ========== -->
    <section class="tab-panel active" id="panel-settings">
      <div class="card">
        <div class="card-title">API 配置</div>
        <div class="card-body">
          <div class="form-group">
            <label for="apiKey">API Key</label>
            <div class="input-row">
              <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" spellcheck="false">
              <button class="btn-icon" id="toggleApiKey" title="显示/隐藏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="baseUrl">接口地址 (Base URL)</label>
            <input type="text" id="baseUrl" placeholder="https://api.deepseek.com" autocomplete="off" spellcheck="false">
          </div>
          <div class="form-group">
            <label for="model">模型名称</label>
            <input type="text" id="model" placeholder="deepseek-v4-flash" autocomplete="off" spellcheck="false">
          </div>
          <div class="form-actions">
            <button class="btn btn-outline" id="testBtn">测试连接</button>
          </div>
          <div id="status" class="status-msg hidden"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">翻译偏好</div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group flex-1">
              <label for="sourceLang">源语言</label>
              <select id="sourceLang">
                <option value="auto">自动检测</option>
                <option value="zh">中文</option><option value="en">英语</option>
                <option value="ja">日语</option><option value="ko">韩语</option>
                <option value="fr">法语</option><option value="de">德语</option><option value="es">西班牙语</option>
              </select>
            </div>
            <div class="swap-btn" id="swapLang" title="交换语言">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
            </div>
            <div class="form-group flex-1">
              <label for="targetLang">目标语言</label>
              <select id="targetLang">
                <option value="zh">中文</option><option value="en">英语</option>
                <option value="ja">日语</option><option value="ko">韩语</option>
                <option value="fr">法语</option><option value="de">德语</option><option value="es">西班牙语</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="summaryLang">总结语言</label>
            <select id="summaryLang">
              <option value="zh">中文</option><option value="en">英语</option>
            </select>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="saveBtn">保存设置</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 历史 Tab ========== -->
    <section class="tab-panel" id="panel-history">
      <div class="panel-toolbar">
        <span class="toolbar-title" id="historyCount">共 0 条记录</span>
        <button class="btn btn-sm btn-outline-danger" id="clearHistoryBtn">清空全部</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">暂无翻译记录</div>
          <div class="empty-sub">开始使用翻译或总结功能后，记录会显示在这里</div>
        </div>
      </div>
    </section>

    <!-- ========== 统计 Tab ========== -->
    <section class="tab-panel" id="panel-stats">
      <div class="stats-grid">
        <div class="stat-card primary">
          <div class="stat-value" id="statTotalTokens">0</div>
          <div class="stat-label">Token 总消耗</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotalRequests">0</div>
          <div class="stat-label">总请求次数</div>
        </div>
        <div class="stat-card accent1">
          <div class="stat-value" id="statTranslateTokens">0</div>
          <div class="stat-label">翻译 Token</div>
        </div>
        <div class="stat-card accent2">
          <div class="stat-value" id="statSummarizeTokens">0</div>
          <div class="stat-label">总结 Token</div>
        </div>
      </div>
      <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="stat-card">
          <div class="stat-value stat-sm" id="statTranslateRequests">0</div>
          <div class="stat-label">翻译请求</div>
        </div>
        <div class="stat-card">
          <div class="stat-value stat-sm" id="statSummarizeRequests">0</div>
          <div class="stat-label">总结请求</div>
        </div>
      </div>
      <div class="chart-container" id="chartContainer">
        <div class="chart-title">Token 消耗分布</div>
        <div class="bar-chart">
          <div class="bar-row">
            <span class="bar-label">翻译</span>
            <div class="bar-track"><div class="bar-fill bar-translate" id="barTranslate" style="width:0%"></div></div>
          </div>
          <div class="bar-row">
            <span class="bar-label">总结</span>
            <div class="bar-track"><div class="bar-fill bar-summarize" id="barSummarize" style="width:0%"></div></div>
          </div>
        </div>
      </div>
    </section>

  </div>
  <script src="dashboard.js"></script>
</body>
</html>
